<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mirai - Sign Up</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="auth-page">
    <section class="auth-panel auth-welcome">
      <div class="auth-logo">
        <img src="logo-mirai.png" alt="Mirai Logo">
      </div>

      <h3>Hi! Are you new here?</h3>
      <h1>Create Your<br>Free Account</h1>
    </section>

    <section class="auth-panel auth-form-panel">
      <div class="question-card">
        <h1>Sign up</h1>

        <p class="auth-switch">
          Already have an account?
          <a href="signin.html">Sign In</a>
        </p>

        <form>
          <label for="fullname">Full Name</label>
          <input type="text" id="fullname" name="fullname">

          <label for="email">Email</label>
          <input type="email" id="email" name="email">

          <label for="password">Password</label>
          <input type="password" id="password" name="password">

          <label class="terms-row">
            <input type="checkbox" name="terms">
            <span>I agree to Mirai's Terms of Service and Privacy Policy</span>
          </label>

          <button type="submit" class="btn-next">
            Create Account →
          </button>
        </form>
      </div>
    </section>
  </main>

</body>
</html>
